services:
  openvpn:
    build: .
    container_name: openvpn-server
    restart: unless-stopped
    ports:
      - "1194:1194/udp"
    cap_add:
      - NET_ADMIN
    devices:
      - /dev/net/tun:/dev/net/tun
    volumes:
      - openvpn_data:/opt/amneziavpn_data
    environment:
      - HOST_ADDR=${HOST_ADDR:-localhost}
    sysctls:
      - net.ipv4.ip_forward=1

volumes:
  openvpn_data:
    driver: local
